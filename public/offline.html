<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline · Strativ Games</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b1220;
    background-image:
      radial-gradient(800px 400px at 80% -10%, rgba(249, 115, 22, 0.15), transparent 60%),
      radial-gradient(700px 400px at -10% 30%, rgba(34, 197, 94, 0.1), transparent 60%);
    color: #f1f5f9;
    font-family: system-ui, sans-serif;
  }
  .card {
    background: linear-gradient(160deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 8px 32px rgba(0,0,0,0.35);
    backdrop-filter: blur(14px);
    padding: 2.5rem 3rem;
    text-align: center;
    max-width: 22rem;
  }
  h1 { color: #fb923c; font-size: 1.5rem; margin: 0 0 .5rem; font-style: italic; text-transform: uppercase; }
  p { color: #94a3b8; font-size: .9rem; margin: 0 0 1.5rem; }
  button {
    background: linear-gradient(180deg, #f97316, #ea580c);
    border: none;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(249, 115, 22, 0.4);
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: .05em;
    padding: .65rem 1.5rem;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>⏸ Signal lost</h1>
    <p>You're offline. Reconnect to get back in the game.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
